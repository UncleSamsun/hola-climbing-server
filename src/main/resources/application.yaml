spring:
  application:
    name: hola-climbing-server

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}  # нҷҳкІҪліҖмҲҳ м—Ҷмңјл©ҙ local кё°ліё

  # DB migration
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    validate-on-migrate: true

  # мҳҒмғҒ м—…лЎңл“ң нҒ¬кё° м ңн•ң (л©ҖнӢ°нҢҢнҠё)
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB        # мҳҒмғҒ н•ң к°ңлӢ№ мөңлҢҖ
      max-request-size: 500MB     # мҡ”мІӯ м „мІҙ мөңлҢҖ
      file-size-threshold: 10MB   # л©”лӘЁлҰ¬вҶ’л””мҠӨнҒ¬ м „нҷҳ мһ„кі„к°’

  # Jackson(JSON) м„Өм •
  jackson:
    default-property-inclusion: non_null  # null н•„л“ң мқ‘лӢөм—җм„ң м ңмҷё
    time-zone: Asia/Seoul
    # property-naming-strategy лҜём§Җм • вҶ’ camelCase (Java н•„л“ңлӘ… к·ёлҢҖлЎң). н”„лЎ нҠё(Vue3+TS)мҷҖ нҶөмқј.

# MyBatis м„Өм •
mybatis:
  mapper-locations: classpath:mapper/**/*.xml      # XML Mapper мң„м№ҳ
  type-aliases-package: com.holaclimbing.server     # @Alias мһҗлҸҷ мҠӨмә” нҢЁнӮӨм§Җ
  type-handlers-package: com.holaclimbing.server.config.typehandler  # нғҖмһ… н•ёл“Өлҹ¬ мң„м№ҳ
  configuration:
    map-underscore-to-camel-case: true   # DBмқҳ user_id вҶ” Javaмқҳ userId мһҗлҸҷ л§Өн•‘
    default-fetch-size: 100
    default-statement-timeout: 30
    cache-enabled: true

# Swagger UI кІҪлЎң м„Өм •
springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true   # мҡ”мІӯ мҶҢмҡ”мӢңк°„ н‘ңмӢң
    groups-order: asc
  packages-to-scan:
    - com.holaclimbing.server.domain
    - com.holaclimbing.server.common.exception.docs
  paths-to-match: /api/**
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# м„ңлІ„ м„Өм •
server:
  port: 8080
  shutdown: graceful   # м§„н–ү мӨ‘мқё мҡ”мІӯ л§Ҳл¬ҙлҰ¬ нӣ„ мў…лЈҢ
  tomcat:
    connection-timeout: 30s
    max-swallow-size: 500MB   # мҳҒмғҒ м—…лЎңл“ң лҢҖл№„
    mbeanregistry:
      enabled: true   # tomcat_threads_* л©”нҠёлҰӯ л…ём¶ң (мҡ”мІӯ мҠӨл Ҳл“ң нҸ¬нҷ”лҸ„ лӘЁлӢҲн„°л§Ғ)

# Actuator л…ём¶ң лІ”мң„
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus   # prometheus вҶ’ Grafana лҢҖмӢңліҙл“ңмҡ© мҠӨнҒ¬лһҳн•‘
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: hola-climbing-server   # лӘЁл“  л©”нҠёлҰӯм—җ application лқјлІЁ л¶Җм°© (Grafana н•„н„°мҡ©)
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms, 300ms, 500ms, 1s, 2s, 5s
  prometheus:
    metrics:
      export:
        enabled: true
#      show-details: always   # when-authorized вҶ’ always ліҖкІҪ
#      show-components: always
# м•ұ мһҗмІҙ м»ӨмҠӨн…Җ м„Өм •
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}   # м„ңлІ„ кіөк°ң URL (AI callback л“ұ м„ңлІ„ кё°мӨҖ URL)
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}  # л©”мқј мқёмҰқВ·кіөмң  л§ҒнҒ¬ мғқм„ұ кё°мӨҖ FE URL
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}   # FE(Vue3+Vite) к°ңл°ң м„ңлІ„
  admin:
    bootstrap:
      enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${ADMIN_BOOTSTRAP_EMAIL:}
  mail:
    mode: ${APP_MAIL_MODE:log}
    from: ${APP_MAIL_FROM:no-reply@hola.local}
  upload:
    allowed-extensions: mp4,mov,hevc   # NF-05: MP4В·MOVВ·HEVC
    max-duration-seconds: 60           # NF-05: мөңлҢҖ 60мҙҲ
    max-file-size-bytes: 209715200     # NF-05: мөңлҢҖ 200MB
  # FCM н‘ёмӢң м•ҢлҰј (мҳҒмғҒ л¶„м„қ мҷ„лЈҢ/мӢӨнҢЁ м•ҢлҰј)
  # enabled=falseл©ҙ NoopFcmSenderк°Җ мЈјмһ…лҗҳм–ҙ нҳём¶ңмқҙ лӘЁл‘җ no-op (к°ңл°ңВ·н…ҢмҠӨнҠё кё°ліёк°’).
  # мҡҙмҳҒм—җм„ңлҠ” enabled=true + м„ңл№„мҠӨ кі„м • нӮӨ кІҪлЎң(лҳҗлҠ” GOOGLE_APPLICATION_CREDENTIALS) м§Җм •.
  fcm:
    enabled: ${FCM_ENABLED:false}
    credentials-path: ${FCM_CREDENTIALS_PATH:}

# GCS(Google Cloud Storage) м—°лҸҷ вҖ” мҳҒмғҒ м—…лЎңл“ң/мһ¬мғқ Signed URL
gcs:
  bucket: ${GCS_BUCKET:hola-climbing-log-videos}
  upload-prefix: videos/uploads        # м—…лЎңл“ң к°қмІҙ кІҪлЎң prefix
  signed-url-minutes: 15               # Signed URL мң нҡЁмӢңк°„(л¶„)

# AI л¶„м„қ мӣҢм»Ө(Python) м—°лҸҷ вҖ” мҳҒмғҒ л“ұлЎқ мӢң Redis StreamsлЎң мҡ”мІӯн•ҳкі  мҪңл°ұ мӢңнҒ¬лҰҝмқ„ кІҖмҰқ
ai:
  callback-secret: ${AI_CALLBACK_SECRET:}
# JWT м„Өм •
jwt:
  secret: ${JWT_SECRET:9f2b7a8c4e6d1f0a3b5c7d9e2f4a6b8c1d3e5f7a9b0c2d4e6f8a1b3c5d7e9f0a}
  access-token-validity-minutes: 30
  refresh-token-validity-days: 14
  issuer: hola-climbing
